<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Neon Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    
    <!-- Glow filter for modern neon feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing border ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="8" />

  <!-- Document Sheet Silhouette Background -->
  <path d="M150 110h150l100 100v192c0 22-18 40-40 40H150c-22 0-40-18-40-40V150c0-22 18-40 40-40z" fill="white" fill-opacity="0.08" />
  
  <!-- Folded Page Corner representation -->
  <path d="M300 110v60c0 22 18 40 40 40h60L300 110z" fill="white" fill-opacity="0.15" />

  <!-- Stylized Futuristic 'R' -->
  <path d="M190 170h90c45 0 75 22 75 62 0 32-20 52-50 58l58 90h-48l-52-82h-33v82h-40V170zm40 92h45c22 0 35-10 35-26s-13-26-35-26h-45v52z" fill="white" filter="url(#glow)" />
  
  <!-- Glowing AI Sparkles (Large) -->
  <path d="M390 115c0 12 8 20 20 20-12 0-20 8-20 20 0-12-8-20-20-20 12 0 20-8 20-20z" fill="#38bdf8" filter="url(#glow)" />
  <!-- Glowing AI Sparkles (Small) -->
  <path d="M130 380c0 8 5 13 13 13-8 0-13 5-13 13 0-8-5-13-13-13 8 0 13-5 13-13z" fill="#a7f3d0" />
</svg>